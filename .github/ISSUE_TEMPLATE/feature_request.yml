name: Feature request
description: Suggest an improvement for Todobar.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow should Todobar make easier?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, UI, or platform integration you want.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform impact
      options:
        - Windows
        - macOS
        - Both desktop platforms
        - Web preview only
        - Not platform-specific
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints or privacy notes
      description: Mention any data access, AI, MCP, or permission concerns.
